<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #111111; /* 改为深色背景 */
            overflow: hidden; margin: 0;
        }
        .container { position: relative; width: 400px; height: 400px; }
        .circle { 
            position: absolute; top: 80px; left: 50px;
            width: 120px; height: 120px; background-color: #e32636; border-radius: 50%; 
            mix-blend-mode: screen; transition: transform 0.2s ease-out;
        }
        .rectangle { 
            position: absolute; bottom: 80px; right: 50px;
            width: 160px; height: 100px; background-color: #1a5b92; 
            mix-blend-mode: screen; transition: transform 0.2s ease-out;
        }
        /* 新增：包豪斯经典的黄色三角形 */
        .triangle { 
            position: absolute; top: 150px; left: 140px;
            width: 0; height: 0; 
            border-left: 70px solid transparent; 
            border-right: 70px solid transparent; 
            border-bottom: 120px solid #f9d71c; 
            mix-blend-mode: screen; transition: transform 0.2s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle" id="s1"></div>
        <div class="rectangle" id="s2"></div>
        <div class="triangle" id="s3"></div>
    </div>

    <script>
        document.addEventListener('mousemove', function(e) {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            
            document.getElementById('s1').style.transform = `translate(${x}px, ${y}px)`;
            document.getElementById('s2').style.transform = `translate(${-x}px, ${-y}px) rotate(${x}deg)`;
            document.getElementById('s3').style.transform = `translate(${y}px, ${-x}px) scale(1.2)`;
        });
    </script>
</body>
</html>
