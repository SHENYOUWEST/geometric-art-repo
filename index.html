<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #f4f4f0; overflow: hidden; margin: 0;
        }
        .container { position: relative; width: 300px; height: 300px; }
        .circle { 
            position: absolute; top: 50px; left: 20px;
            width: 120px; height: 120px; background-color: #e32636; border-radius: 50%; 
            transition: transform 0.1s ease-out; mix-blend-mode: multiply;
        }
        .rectangle { 
            position: absolute; bottom: 50px; right: 20px;
            width: 160px; height: 100px; background-color: #1a5b92; 
            transition: transform 0.1s ease-out; mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle" id="shape1"></div>
        <div class="rectangle" id="shape2"></div>
    </div>

    <script>
        // 监听鼠标在整个页面的移动
        document.addEventListener('mousemove', function(e) {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
            
            // 让图形根据鼠标位置产生位移和旋转
            document.getElementById('shape1').style.transform = `translate(${xAxis}px, ${yAxis}px) scale(1.1)`;
            document.getElementById('shape2').style.transform = `translate(${-xAxis}px, ${-yAxis}px) rotate(${xAxis}deg)`;
        });
    </script>
</body>
</html>
